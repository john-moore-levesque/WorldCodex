  #################
  # Codex Lambdas #
  #################
  # Main Lambda
  Codex:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: !Sub Codex-${WorldName}-Lambda
      CodeUri: ../src/
      Handler: app.codexHandler
      Runtime: python3.14
      MemorySize: 3008
      Timeout: 30
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:017000801446:layer:AWSLambdaPowertoolsPythonV3-python314-x86_64:32
      Tracing: Active
      Environment:
        Variables:
          TIMELINE_TABLE_NAME: !Ref TimelineDynamoDB
          TIMELINE_TABLE_ARN: !GetAtt TimelineDynamoDB.Arn
          FACTIONS_TABLE_NAME: !Ref FactionsDynamoDB
          FACTIONS_TABLE_ARN: !GetAtt FactionsDynamoDB.Arn
          TECHNOLOGY_TABLE_NAME: !Ref TechnologyDynamoDB
          TECHNOLOGY_TABLE_ARN: !GetAtt TechnologyDynamoDB.Arn
          SPECIES_TABLE_NAME: !Ref SpeciesDynamoDB
          SPECIES_TABLE_ARN: !GetAtt SpeciesDynamoDB.Arn
          LOCATIONS_TABLE_NAME: !Ref LocationsDynamoDB
          LOCATIONS_TABLE_ARN: !GetAtt LocationsDynamoDB.Arn
          OVERVIEW_TABLE_NAME: !Ref OverviewDynamoDB
          OVERVIEW_TABLE_ARN: !GetAtt OverviewDynamoDB.Arn
          LORE_TABLE_NAME: !Ref LoreDynamoDB
          LORE_TABLE_ARN: !GetAtt LoreDynamoDB.Arn
          CHARACTERS_TABLE_NAME: !Ref CharactersDynamoDB
          CHARACTERS_TABLE_ARN: !GetAtt CharactersDynamoDB.Arn
          STORIES_TABLE_NAME: !Ref StoriesDynamoDB
          STORIES_TABLE_ARN: !GetAtt StoriesDynamoDB.Arn
          WORLD: !Sub ${WorldName}
          CODEXIMAGEBUCKET_BUCKET_NAME: !Ref CodexImagesBucket
          CLOUDFRONT_DOMAIN: !GetAtt CodexCloudFrontDistribution.DomainName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TimelineDynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref FactionsDynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref TechnologyDynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref SpeciesDynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref OverviewDynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref LocationsDynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref LoreDynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref CharactersDynamoDB
        - DynamoDBCrudPolicy:
            TableName: !Ref StoriesDynamoDB
        - S3WritePolicy:
            BucketName: !Ref CodexImagesBucket
      Events:
        ApiGEToverview:
          Type: Api
          Properties:
            Path: /overview
            Method: GET
            RestApiId: !Ref CodexApi
        ApiPUToverview:
          Type: Api
          Properties:
            Path: /overview
            Method: PUT
            RestApiId: !Ref CodexApi
        ApiGETlore:
          Type: Api
          Properties:
            Path: /lore
            Method: GET
            RestApiId: !Ref CodexApi
        ApiPUTlore:
          Type: Api
          Properties:
            Path: /lore
            Method: PUT
            RestApiId: !Ref CodexApi
        ApiGETtimeline:
          Type: Api
          Properties:
            Path: /timeline
            Method: GET
            RestApiId: !Ref CodexApi
        ApiPUTtimeline:
          Type: Api
          Properties:
            Path: /timeline
            Method: PUT
            RestApiId: !Ref CodexApi
        ApiGETspecies:
          Type: Api
          Properties:
            Path: /species
            Method: GET
            RestApiId: !Ref CodexApi
        ApiPUTspecies:
          Type: Api
          Properties:
            Path: /species
            Method: PUT
            RestApiId: !Ref CodexApi
        ApiGETfactions:
          Type: Api
          Properties:
            Path: /factions
            Method: GET
            RestApiId: !Ref CodexApi
        ApiPUTfactions:
          Type: Api
          Properties:
            Path: /factions
            Method: PUT
            RestApiId: !Ref CodexApi
        ApiPUTtechnology:
          Type: Api
          Properties:
