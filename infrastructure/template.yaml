  # Codex Lambda Log Group
  CodexLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${Codex}
      RetentionInDays: 30

  # Codex Backup Lambda
  CodexBackup:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: CodexBackup
      CodeUri: ../src/
      Handler: app.codexBackupHandler
      Runtime: python3.14
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Events:
        CloudWatchEvent:
          Type: ScheduleV2
          Properties:
            Name: !Sub codex-${WorldName}-backup-event
            ScheduleExpression: cron(0 0 ? * SUN *) # weekly on Sunday
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:017000801446:layer:AWSLambdaPowertoolsPythonV3-python314-x86_64:32
      Environment:
        Variables:
          CODEXBACKUPBUCKET_BUCKET_NAME: !Ref CodexBackupBucket
          CODEXBACKUPBUCKET_BUCKET_ARN: !GetAtt CodexBackupBucket.Arn
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TimelineDynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref FactionsDynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref TechnologyDynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref SpeciesDynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref LocationsDynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref OverviewDynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref LoreDynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref CharactersDynamoDB
        - DynamoDBReadPolicy:
            TableName: !Ref StoriesDynamoDB
        - S3WritePolicy:
            BucketName: !Ref CodexBackupBucket

  # Codex Backup Lambda Log Group
  CodexBackupLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${CodexBackup}
      RetentionInDays: 30

  ################
  # Codex Backup #
  ################
  # S3 bucket
  CodexBackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-codexback-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
        BlockPublicAcls: true
        BlockPublicPolicy: true

  # Images S3 bucket
  CodexImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-codeximg-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
        BlockPublicAcls: true
        BlockPublicPolicy: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - PUT
              - GET
            AllowedOrigins:
              - '*'
            MaxAge: 3600

  # Images S3 bucket policy
  CodexImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CodexImagesBucket
      PolicyDocument:
        Id: RequireEncryptionInTransit
        Version: '2012-10-17'
        Statement:
          - Principal: '*'
            Action: '*'
            Effect: Deny
            Resource:
              - !GetAtt CodexImagesBucket.Arn
              - !Sub ${CodexImagesBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          - Action: s3:GetObject
            Effect: Allow
            Resource: !Sub ${CodexImagesBucket.Arn}/*
            Principal:
              CanonicalUser: !GetAtt CodexCloudFormationOriginAccessIdentity.S3CanonicalUserId

  # S3 bucket policy
  CodexBackupBucketBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CodexBackupBucket
      PolicyDocument:
        Id: RequireEncryptionInTransit
        Version: '2012-10-17'
        Statement:
          - Principal: '*'
            Action: '*'
            Effect: Deny
            Resource:
              - !GetAtt CodexBackupBucket.Arn
              - !Sub ${CodexBackupBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  ###########
  # Cognito #
  ###########
  CodexUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: CodexGoogleAuthPool

  CodexGoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref CodexUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Sub "${GoogleClientId}"
        client_secret: !Sub "${GoogleClientSecret}"
        authorize_scopes: email profile openid
      AttributeMapping:
        email: email

  CodexUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CodexGoogleIdentityProvider
    Properties:
      UserPoolId: !Ref CodexUserPool
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - Google
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs: !If
        - IsRootWorldCondition
        - - http://localhost:3000
          - !Sub https://${RootDomain}
          - !Sub https://${WorldName}.${RootDomain}
        - - http://localhost:3000
          - !Sub https://${WorldName}.${RootDomain}
      LogoutURLs: !If
        - IsRootWorldCondition
        - - !Sub https://${RootDomain}
          - !Sub https://${WorldName}.${RootDomain}
        - - !Sub https://${WorldName}.${RootDomain}

  CodexUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref CodexUserPool
      Domain: !Ref CognitoHostedUIDomain

  CodexIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: CodexIdentityPool
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref CodexUserPoolClient
          ProviderName: !GetAtt CodexUserPool.ProviderName

  CodexAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CodexIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: CodexApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CodexApi}/*

  CodexIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CodexIdentityPool
      Roles:
        authenticated: !GetAtt CodexAuthenticatedRole.Arn

  CodexGatewayResponse4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref CodexApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Authorization,X-Amz-Date,X-Amz-Security-Token,Content-Type'"

  CodexGatewayResponseAccessDenied:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref CodexApi
      ResponseType: ACCESS_DENIED
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Authorization,X-Amz-Date,X-Amz-Security-Token,Content-Type'"

  CodexGatewayResponseUnauthorized:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref CodexApi
      ResponseType: UNAUTHORIZED
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Authorization,X-Amz-Date,X-Amz-Security-Token,Content-Type'"