AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

# ─────────────────────────────────────────────────────────────────────────────
# Codex SAM template
#
# This stack assumes you have:
#   1. A domain you own with a Route53 hosted zone in the same AWS account
#      (RootDomain + HostedZoneId parameters).
#   2. A Google OAuth 2.0 app — get GoogleClientId/GoogleClientSecret from
#      https://console.cloud.google.com/apis/credentials.
#
# If you don't want a custom domain, the simplest path is to delete the
# CodexSSLCert, CodexCloudFrontDistribution, CodexRecordSetGroup, and
# CodexApiDomainName resources and just consume the raw API Gateway URL.
# ─────────────────────────────────────────────────────────────────────────────

Parameters:
  WorldName:
    AllowedPattern: '[a-z0-9-.]+'
    Description: Short slug for this world/universe (e.g. "scifi", "fantasy-west"). Used in table names and the per-world subdomain.
    Type: String

  GoogleClientId:
    AllowedPattern: '[a-zA-Z0-9.\-_]+'
    Description: Google OAuth 2.0 Client ID
    Type: String

  GoogleClientSecret:
    AllowedPattern: '[a-zA-Z0-9.\-_]+'
    Description: Google OAuth 2.0 Client Secret
    Type: String

  RootDomain:
    Type: String
    Description: Root domain you own (e.g. "example.com"). Per-world subdomains are derived as ${WorldName}.${RootDomain}.

  HostedZoneId:
    Type: String
    Description: Route53 hosted zone ID for RootDomain (find it in the Route53 console; starts with "Z")

  IsRootWorld:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Whether this world owns the RootDomain apex (i.e. example.com points here, not just myworld.example.com)

  CognitoHostedUIDomain:
    Type: String
    Description: Cognito hosted UI domain prefix (e.g. "myapp" produces myapp.auth.us-east-1.amazoncognito.com)

  ApiDomainName:
    Type: String
    Description: API Gateway custom domain (e.g. api.example.com or myworld-api.example.com)

Conditions:
  IsRootWorldCondition: !Equals [!Ref IsRootWorld, "true"]

Description: |
  SAM template for creating Codex worldbuilding app

Globals:
  # https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-specification-template-anatomy-globals.html
  Function:
    Timeout: 5
    MemorySize: 128
    Runtime: python3.14

    Tracing: Active
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true

Resources:

  ##############
  # Networking #
  ##############
  # SSL
  CodexSSLCert:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref RootDomain
      SubjectAlternativeNames:
        - !Sub '*.${RootDomain}'
      ValidationMethod: DNS

  # CloudFront
  CodexCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        ViewerCertificate:
          AcmCertificateArn: !Ref CodexSSLCert
          SslSupportMethod: sni-only
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: CodexCDN
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CacheBehaviors:
          - PathPattern: images/*
            TargetOriginId: CodexImagesCDN
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        Aliases: !If
          - IsRootWorldCondition
          - - !Ref RootDomain
            - !Sub ${WorldName}.${RootDomain}
          - - !Sub ${WorldName}.${RootDomain}
        # Client-side routing (BrowserRouter): any deep URL that S3 doesn't
        # have a matching object for must serve index.html so the SPA can
        # take over. Without this, /locations/sol would 404 on refresh.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        Enabled: true
        Origins:
          - DomainName: !GetAtt CodexFrontEndBucket.RegionalDomainName
            Id: CodexCDN
            S3OriginConfig:
              OriginAccessIdentity: !Sub
                - origin-access-identity/cloudfront/${OriginAccessIdentity}
                - OriginAccessIdentity: !Ref CodexCloudFormationOriginAccessIdentity
          - DomainName: !GetAtt CodexImagesBucket.RegionalDomainName
            Id: CodexImagesCDN
            S3OriginConfig:
              OriginAccessIdentity: !Sub
                - origin-access-identity/cloudfront/${OriginAccessIdentity}
                - OriginAccessIdentity: !Ref CodexCloudFormationOriginAccessIdentity

  CodexFrontEndBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-codexfrontend-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
        BlockPublicAcls: true
        BlockPublicPolicy: true

  CodexFrontEndBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CodexFrontEndBucket
      PolicyDocument:
        Id: RequireEncryptionInTransit
        Version: '2012-10-17'
        Statement:
          - Principal: '*'
            Action: '*'
            Effect: Deny
            Resource:
              - !GetAtt CodexFrontEndBucket.Arn
              - !Sub ${CodexFrontEndBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          - Action: s3:getObject
            Effect: Allow
            Resource:
              - !Sub ${CodexFrontEndBucket.Arn}/*
            Principal:
              CanonicalUser: !GetAtt CodexCloudFormationOriginAccessIdentity.S3CanonicalUserId

  CodexCloudFormationOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: CodexCDN

  CodexRecordSetGroup:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      Comment: Codex app Route53 records
      HostedZoneId: !Ref HostedZoneId
      RecordSets:
        - !If
          - IsRootWorldCondition
          - Name: !Ref RootDomain
            Type: A
            AliasTarget:
              DNSName: !GetAtt CodexCloudFrontDistribution.DomainName
              HostedZoneId: Z2FDTNDATAQYW2
          - !Ref AWS::NoValue
        - !If
          - IsRootWorldCondition
          - Name: !Ref RootDomain
            Type: AAAA
            AliasTarget:
              DNSName: !GetAtt CodexCloudFrontDistribution.DomainName
              HostedZoneId: Z2FDTNDATAQYW2
          - !Ref AWS::NoValue
        - Name: !Sub ${WorldName}.${RootDomain}
          Type: A
          AliasTarget:
            DNSName: !GetAtt CodexCloudFrontDistribution.DomainName
            HostedZoneId: Z2FDTNDATAQYW2
        - Name: !Sub ${WorldName}.${RootDomain}
          Type: AAAA
          AliasTarget:
            DNSName: !GetAtt CodexCloudFrontDistribution.DomainName
            HostedZoneId: Z2FDTNDATAQYW2
        - Name: !Ref ApiDomainName
          Type: A
          AliasTarget:
            DNSName: !GetAtt CodexApiDomainName.RegionalDomainName
            HostedZoneId: !GetAtt CodexApiDomainName.RegionalHostedZoneId

  #############
  # Codex API #
  #############
  # API Domain Name
  CodexApiDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref CodexSSLCert
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Base Path Mapping
  CodexApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: CodexApiProdStage
    Properties:
      DomainName: !Ref CodexApiDomainName
      RestApiId: !Ref CodexApi
      Stage: Prod

  # API
  CodexApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub
        - ${ResourceName} From Stack ${AWS::StackName}
        - ResourceName: !Sub codex-${WorldName}-api
      StageName: Prod
      DefinitionBody:
        openapi: '3.0'
        info: {}
        paths:
          /overview:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /lore:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /timeline:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /species:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /factions:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /technology:
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /locations:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /characters:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /stories:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
            put:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
          /images/upload:
            post:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Codex.Arn}/invocations
              responses: {}
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      Cors:
        AllowOrigin: '''*'''
        AllowHeaders: '''Authorization, X-Amz-Date, X-Amz-Security-Token, Content-Type, x-amz-content-sha256'''
        AllowMethods: '''GET,PUT,POST'''
        MaxAge: 600
      Auth:
        DefaultAuthorizer: AWS_IAM
        AddDefaultAuthorizerToCorsPreflight: false

  ##################
  # Codex DynamoDB #
  ##################
  # Overview DynamoDB Table
  OverviewDynamoDB:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub codex-${WorldName}-overview
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # Lore DynamoDB Table
  LoreDynamoDB:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
